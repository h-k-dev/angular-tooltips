<mat-dialog-content>
    <p>
        <label for="theme" ngTooltip="Select the theme for the application">Theme</label>
        <select id="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </p>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-button mat-dialog-close ngTooltip="Close the settings dialog">Close</button>
</mat-dialog-actions>
